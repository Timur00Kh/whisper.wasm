name: Release (npm + GitHub draft)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build WASM files
        uses: docker/build-push-action@v5
        with:
          context: .
          target: export-stage
          outputs: type=local,dest=./wasm
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Fix worker import paths
        run: |
          for file in ./wasm/*.js; do
            filename=$(basename "$file")
            echo "Fixing $filename"
            node -e "
          const fs = require('fs');
          const content = fs.readFileSync('$file', 'utf8');
          fs.writeFileSync('$file', content.replace(/$filename/g, ''));
          "
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          echo "Tag: ${TAG} (version ${TAG_VERSION})"
          echo "package.json version: ${PKG_VERSION}"

          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match package.json version (${PKG_VERSION})."
            exit 1
          fi

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build library
        run: npm run build:lib

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Package release assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          tar -czf "whisper-wasm-${TAG}.tar.gz" wasm
          tar -czf "whisper-dist-${TAG}.tar.gz" dist
          ls -lah "whisper-wasm-${TAG}.tar.gz" "whisper-dist-${TAG}.tar.gz"

      - name: Create GitHub Release (draft) with notes + assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --draft \
            --generate-notes \
            --title "${TAG}" \
            "whisper-wasm-${TAG}.tar.gz" \
            "whisper-dist-${TAG}.tar.gz"
