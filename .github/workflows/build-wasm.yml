name: Auto-update Whisper.cpp

on:
  schedule:
    # Run weekly on Sunday at 2 AM UTC to check for new whisper.cpp releases
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      whisper_version:
        description: 'Whisper.cpp version to build (e.g., v1.7.6)'
        required: false
        default: 'latest'

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
      should-update: ${{ steps.check.outputs.should-update }}
      beta-version: ${{ steps.prepare_beta.outputs.beta-version }}
      should-publish: ${{ steps.prepare_beta.outputs.should-publish }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new whisper.cpp releases
        id: check
        run: |
          # Get current version from Dockerfile
          CURRENT_VERSION=$(grep 'ARG WHISPER_CPP_VERSION=' Dockerfile | cut -d'"' -f2)
          echo "Current version in Dockerfile: $CURRENT_VERSION"

          # Get latest version from whisper.cpp releases
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.whisper_version }}"
            if [ "$VERSION" = "latest" ]; then
              VERSION=$(curl -s https://api.github.com/repos/ggml-org/whisper.cpp/releases/latest | jq -r '.tag_name')
            fi
          else
            VERSION=$(curl -s https://api.github.com/repos/ggml-org/whisper.cpp/releases/latest | jq -r '.tag_name')
          fi

          echo "Latest whisper.cpp version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Compare versions
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "No new version available. Current: $CURRENT_VERSION, Latest: $VERSION"
            echo "should-update=false" >> $GITHUB_OUTPUT
          else
            echo "New version available! Current: $CURRENT_VERSION -> Latest: $VERSION"
            echo "should-update=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Dockerfile
        if: steps.check.outputs.should-update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          echo "Updating Dockerfile with version: $VERSION"
          sed -i 's/ARG WHISPER_CPP_VERSION=".*"/ARG WHISPER_CPP_VERSION="'$VERSION'"/' Dockerfile

          # Verify the change
          grep 'ARG WHISPER_CPP_VERSION=' Dockerfile

      - name: Set up Docker Buildx
        if: steps.check.outputs.should-update == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build WASM files
        if: steps.check.outputs.should-update == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: export-stage
          outputs: type=local,dest=./wasm
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Fix worker import paths
        if: steps.check.outputs.should-update == 'true'
        run: |
          for file in ./wasm/*.js; do
            filename=$(basename "$file")
            echo "Fixing $filename"
            node -e "
          const fs = require('fs');
          const content = fs.readFileSync('$file', 'utf8');
          fs.writeFileSync('$file', content.replace(/$filename/g, ''));
          "
          done

      - name: Upload WASM artifact
        if: steps.check.outputs.should-update == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-wasm-files
          path: wasm/
          retention-days: 7

      - name: Setup Node.js
        if: steps.check.outputs.should-update == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.check.outputs.should-update == 'true'
        run: npm ci

      - name: Run linter
        if: steps.check.outputs.should-update == 'true'
        run: npm run lint

      - name: Run tests
        if: steps.check.outputs.should-update == 'true'
        run: npm run test:ci

      - name: Build project
        if: steps.check.outputs.should-update == 'true'
        run: npm run build

      - name: Prepare beta version
        if: steps.check.outputs.should-update == 'true'
        id: prepare_beta
        run: |
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Get whisper.cpp version
          WHISPER_VERSION="${{ steps.check.outputs.version }}"
          echo "Whisper.cpp version: $WHISPER_VERSION"

          # Create beta version
          BETA_VERSION="${CURRENT_VERSION}-beta.whisper.cpp-${WHISPER_VERSION}"
          echo "Beta version: $BETA_VERSION"
          echo "beta-version=$BETA_VERSION" >> $GITHUB_OUTPUT

          # Check if this version already exists in NPM
          PACKAGE_NAME="@timur00kh/whisper.wasm"
          if npm view "${PACKAGE_NAME}@${BETA_VERSION}" version 2>/dev/null; then
            echo "⚠️ Version ${BETA_VERSION} already exists in NPM"
            echo "should-publish=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Version ${BETA_VERSION} does not exist, will publish"
            echo "should-publish=true" >> $GITHUB_OUTPUT
          fi

  publish-beta:
    needs: check-and-update
    if: needs.check-and-update.outputs.should-update == 'true' && needs.check-and-update.outputs.should-publish == 'true'
    permissions:
      contents: read
      id-token: write
      actions: read
    uses: ./.github/workflows/npm-publish.yml
    with:
      channel: beta
      version: ${{ needs.check-and-update.outputs.beta-version }}
      npm_tag: beta
      wasm_artifact_name: whisper-wasm-files
      run_checks: true

  create-pull-request:
    runs-on: ubuntu-latest
    needs: [check-and-update, publish-beta]
    if: >
      always() &&
      needs.check-and-update.outputs.should-update == 'true' &&
      needs.publish-beta.result != 'failure' &&
      needs.publish-beta.result != 'cancelled'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Dockerfile
        run: |
          VERSION="${{ needs.check-and-update.outputs.version }}"
          echo "Updating Dockerfile with version: $VERSION"
          sed -i 's/ARG WHISPER_CPP_VERSION=".*"/ARG WHISPER_CPP_VERSION="'$VERSION'"/' Dockerfile
          grep 'ARG WHISPER_CPP_VERSION=' Dockerfile

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: whisper-wasm-files
          path: wasm/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update whisper.cpp to ${{ needs.check-and-update.outputs.version }}'
          title: 'chore: update whisper.cpp to ${{ needs.check-and-update.outputs.version }}'
          body: |
            ## Summary

            Automatic update of whisper.cpp to version **${{ needs.check-and-update.outputs.version }}**.

            ## Changes

            - Updated `Dockerfile` with whisper.cpp ${{ needs.check-and-update.outputs.version }}
            - Rebuilt WASM binaries (`wasm/` directory)
            - All tests passed ✅

            ## NPM Publication

            ${{ needs.check-and-update.outputs.should-publish == 'true' && format('✅ Beta version published to NPM:\n```bash\nnpm install @timur00kh/whisper.wasm@beta\n# Version: {0}\n```', needs.check-and-update.outputs.beta-version) || format('⚠️ Beta version `{0}` already exists in NPM - skipped publication', needs.check-and-update.outputs.beta-version) }}

            ## Testing

            - ✅ Linter passed
            - ✅ Unit tests passed
            - ✅ Build successful

            Please review and merge to include this update in the next stable release.
          branch: auto-update-whisper-${{ needs.check-and-update.outputs.version }}
          delete-branch: true
          labels: dependencies,automated
