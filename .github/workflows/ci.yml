name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'push' ||
      (
        !contains(github.event.head_commit.message, '[skip ci]')
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build WASM files
        uses: docker/build-push-action@v5
        with:
          context: .
          target: export-stage
          outputs: type=local,dest=./wasm
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Fix worker import paths
        run: |
          for file in ./wasm/*.js; do
            filename=$(basename "$file")
            echo "Fixing $filename"
            node -e "
          const fs = require('fs');
          const content = fs.readFileSync('$file', 'utf8');
          fs.writeFileSync('$file', content.replace(/$filename/g, ''));
          "
          done

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whisper-wasm-files
          path: wasm/
          retention-days: 30

  test:
    runs-on: ubuntu-latest
    needs: build-wasm
    if: >
      github.event_name != 'push' ||
      (
        !contains(github.event.head_commit.message, '[skip ci]')
      )

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: whisper-wasm-files
          path: wasm/

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build project
        run: npm run build

  deploy-demo:
    runs-on: ubuntu-latest
    needs: [test, build-wasm]
    if: >
      github.ref == 'refs/heads/main' &&
      (
        github.event_name != 'push' ||
        (
          !contains(github.event.head_commit.message, '[skip ci]')
        )
      )
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: whisper-wasm-files
          path: wasm/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Build demo
        run: npm run build:demo:github

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo-dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-canary:
    needs: [test, build-wasm]
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[skip canary]')
    permissions:
      contents: read
      id-token: write
      actions: read
    uses: ./.github/workflows/npm-publish.yml
    with:
      channel: canary
      npm_tag: canary
      wasm_artifact_name: whisper-wasm-files
      run_checks: true
