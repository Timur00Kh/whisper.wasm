changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
        - fix
    - title: 🧰 Refactors & Chores
      labels:
        - refactor
        - chore
    - title: 📚 Documentation
      labels:
        - docs
        - documentation
    - title: 🧪 Tests & CI
      labels:
        - tests
        - ci
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - '*'
